<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bach Studio | Piano Roll Editor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "secondary": "#e4e2e1",
                    "on-error": "#450900",
                    "on-secondary": "#525151",
                    "primary-fixed-dim": "#c4ec00",
                    "on-tertiary": "#665600",
                    "on-surface": "#ffffff",
                    "on-secondary-container": "#d2d0cf",
                    "tertiary-fixed": "#fcdc43",
                    "primary-dim": "#c7ef00",

                    "on-secondary-fixed-variant": "#5c5b5b",
                    "on-error-container": "#ffd2c8",
                    "surface": "#0e0e0e",
                    "surface-dim": "#0e0e0e",
                    "on-primary-fixed-variant": "#556800",
                    "surface-container-low": "#131313",
                    "secondary-dim": "#d6d4d3",
                    "on-tertiary-fixed": "#473b00",
                    "surface-container-highest": "#262626",

                    "headline": ["Inter"],

                    "label": ["Inter Mono", "monospace"]

          },

<style>
        body { font-family: 'Inter', sans-serif; }
        .piano-grid {
            background-size: 40px 24px;
            background-image: 
                linear-gradient(to right, #262626 1px, transparent 1px),
                linear-gradient(to bottom, #262626 1px, transparent 1px);
        }
        .piano-key-white { height: 24px; background: #e4e2e1; border-bottom: 1px solid #484847; }
        .piano-key-black { height: 16px; background: #000; border-bottom: 1px solid #484847; margin-top: -8px; position: relative; z-index: 10; width: 60%; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface selection:bg-primary selection:text-black h-screen flex flex-col overflow-hidden">
<!-- TopNavBar -->
<header class="bg-[#0e0e0e] text-[#f4ffc6] font-['Inter'] font-mono text-[11px] tracking-widest uppercase flex justify-between items-center w-full px-4 h-12 border-b-0 relative z-50">
<div class="flex items-center gap-8">
<span class="text-lg font-black tracking-tighter text-[#f4ffc6] uppercase">Bach Studio</span>
<nav class="flex gap-4">
<a class="text-[#f4ffc6] border-b-2 border-[#f4ffc6] pb-1 hover:bg-[#2c2c2c] transition-colors px-2" href="#">File</a>
<a class="text-zinc-500 hover:bg-[#2c2c2c] transition-colors px-2" href="#">Edit</a>
<a class="text-zinc-500 hover:bg-[#2c2c2c] transition-colors px-2" href="#">Track</a>
<a class="text-zinc-500 hover:bg-[#2c2c2c] transition-colors px-2" href="#">Mix</a>
<a class="text-zinc-500 hover:bg-[#2c2c2c] transition-colors px-2" href="#">View</a>
</nav>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-1 bg-[#131313] px-3 py-1 text-zinc-400">
<span class="material-symbols-outlined text-sm">search</span>
<input class="bg-transparent border-none focus:ring-0 text-[10px] uppercase w-32" placeholder="SEARCH TOOLS" type="text"/>
</div>
<div class="flex gap-2">
<button class="material-symbols-outlined text-[20px] hover:bg-[#2c2c2c] p-1">help</button>
<button class="material-symbols-outlined text-[20px] hover:bg-[#2c2c2c] p-1">settings</button>
<button class="bg-[#f4ffc6] text-black px-4 py-1 font-bold text-[10px] scale-95 active:bg-[#f4ffc6] active:text-black transition-all">EXPORT</button>
</div>
</div>
</header>
<!-- Main Content Area -->
<div class="flex flex-1 overflow-hidden">
<!-- SideNavBar -->
<aside class="bg-[#131313] w-16 border-r-0 flex flex-col items-center py-4 space-y-1 z-40">
<div class="mb-4 text-center">
<p class="font-['Inter'] text-[10px] font-bold uppercase text-[#f4ffc6]">TOOLS</p>
<p class="font-['Inter'] text-[8px] text-zinc-600 uppercase">V1.0</p>
</div>
<button class="w-12 h-12 flex flex-col items-center justify-center bg-[#20201f] text-[#f4ffc6] border-l-2 border-[#f4ffc6] transition-all duration-75">
<span class="material-symbols-outlined text-[20px]">near_me</span>
<span class="text-[8px] font-bold mt-1 uppercase">Select</span>
</button>
<button class="w-12 h-12 flex flex-col items-center justify-center text-zinc-600 hover:bg-[#2c2c2c] transition-all duration-75">
<span class="material-symbols-outlined text-[20px]">content_cut</span>
<span class="text-[8px] font-bold mt-1 uppercase">Cut</span>
</button>
<button class="w-12 h-12 flex flex-col items-center justify-center text-zinc-600 hover:bg-[#2c2c2c] transition-all duration-75">
<span class="material-symbols-outlined text-[20px]">edit</span>
<span class="text-[8px] font-bold mt-1 uppercase">Draw</span>
</button>
<button class="w-12 h-12 flex flex-col items-center justify-center text-zinc-600 hover:bg-[#2c2c2c] transition-all duration-75">
<span class="material-symbols-outlined text-[20px]">volume_off</span>
<span class="text-[8px] font-bold mt-1 uppercase">Mute</span>
</button>
<button class="w-12 h-12 flex flex-col items-center justify-center text-zinc-600 hover:bg-[#2c2c2c] transition-all duration-75">
<span class="material-symbols-outlined text-[20px]">search</span>
<span class="text-[8px] font-bold mt-1 uppercase">Zoom</span>
</button>
<button class="w-12 h-12 flex flex-col items-center justify-center text-zinc-600 hover:bg-[#2c2c2c] transition-all duration-75">
<span class="material-symbols-outlined text-[20px]">swap_horiz</span>
<span class="text-[8px] font-bold mt-1 uppercase">Slip</span>
</button>
</aside>
<!-- Piano Roll Canvas -->
<main class="flex-1 flex flex-col bg-surface-container-low overflow-hidden">
<!-- Context Toolbar -->
<div class="h-10 bg-surface flex items-center px-4 gap-6 border-b border-outline-variant/20">
<div class="flex items-center gap-2">
<span class="text-[9px] font-mono uppercase text-on-surface-variant">Quantize</span>
<div class="flex bg-surface-container-highest">
<button class="px-2 py-1 text-[9px] font-mono text-primary bg-surface-bright">1/16</button>
<button class="px-2 py-1 text-[9px] font-mono text-on-surface-variant hover:text-white">1/8</button>
<button class="px-2 py-1 text-[9px] font-mono text-on-surface-variant hover:text-white">1/4</button>
</div>
</div>
<div class="h-4 w-[1px] bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<button class="flex items-center gap-1 px-2 py-1 bg-primary text-black text-[9px] font-bold uppercase">
<span class="material-symbols-outlined text-xs">grid_on</span> Snap
                    </button>
<button class="flex items-center gap-1 px-2 py-1 text-on-surface-variant text-[9px] font-bold uppercase border border-outline-variant/20 hover:bg-surface-bright">
<span class="material-symbols-outlined text-xs">link</span> Legato
                    </button>
</div>
<div class="flex-1"></div>
<div class="flex items-center gap-4 text-[10px] font-mono text-primary">
<span class="text-on-surface-variant">POS:</span> 004.01.000
                    <span class="text-on-surface-variant">BPM:</span> 128.00
                </div>
</div>
<!-- Piano Roll Editor Core -->
<div class="flex-1 flex overflow-hidden">
<!-- Piano Keys (Left) -->
<div class="w-20 flex-shrink-0 bg-surface-container-highest overflow-y-auto scrollbar-hide border-r border-outline-variant/20">
<div class="relative w-full">
<!-- Example C4-C3 Range -->
<div class="piano-key-white flex items-end justify-end px-1 pb-1"><span class="text-[8px] text-black font-bold uppercase">C4</span></div>
<div class="piano-key-black"></div>
<div class="piano-key-white"></div>
<div class="piano-key-black"></div>
<div class="piano-key-white"></div>
<div class="piano-key-white flex items-end justify-end px-1 pb-1"><span class="text-[8px] text-black font-bold uppercase">G3</span></div>
<div class="piano-key-black"></div>
<div class="piano-key-white"></div>
<div class="piano-key-black"></div>
<div class="piano-key-white"></div>
<div class="piano-key-black"></div>
<div class="piano-key-white"></div>
<div class="piano-key-white flex items-end justify-end px-1 pb-1"><span class="text-[8px] text-black font-bold uppercase">C3</span></div>
<!-- Repeat filler keys for height -->
<div class="piano-key-black"></div><div class="piano-key-white"></div><div class="piano-key-black"></div><div class="piano-key-white"></div><div class="piano-key-white"></div><div class="piano-key-black"></div><div class="piano-key-white"></div><div class="piano-key-black"></div><div class="piano-key-white"></div><div class="piano-key-black"></div><div class="piano-key-white"></div>
</div>
</div>
<!-- Note Grid -->
<div class="flex-1 relative overflow-auto piano-grid">
<!-- Playhead -->
<div class="absolute top-0 bottom-0 left-64 w-[2px] bg-primary z-30 shadow-[0_0_10px_rgba(244,255,198,0.5)]"></div>
<!-- MIDI Notes -->
<div class="absolute top-[24px] left-[40px] w-40 h-5 bg-primary text-black flex items-center px-2 text-[9px] font-bold border-l-2 border-primary-container">E4</div>
<div class="absolute top-[72px] left-[80px] w-20 h-5 bg-primary/80 text-black flex items-center px-2 text-[9px] font-bold border-l-2 border-primary-container">C4</div>
<div class="absolute top-[120px] left-[160px] w-60 h-5 bg-primary text-black flex items-center px-2 text-[9px] font-bold border-l-2 border-primary-container">G3</div>
<div class="absolute top-[168px] left-[240px] w-40 h-5 bg-primary/90 text-black flex items-center px-2 text-[9px] font-bold border-l-2 border-primary-container">E3</div>
<div class="absolute top-[24px] left-[360px] w-80 h-5 bg-primary text-black flex items-center px-2 text-[9px] font-bold border-l-2 border-primary-container">E4</div>
<div class="absolute top-[216px] left-[480px] w-120 h-5 bg-primary text-black flex items-center px-2 text-[9px] font-bold border-l-2 border-primary-container">C3</div>
</div>
</div>
<!-- Velocity Panel (Bottom) -->
<div class="h-24 bg-surface-container-high border-t border-outline-variant/20 flex flex-col">
<div class="px-4 py-1 flex items-center justify-between">
<span class="text-[8px] font-mono text-zinc-500 uppercase tracking-widest">Velocity Controller</span>
<span class="text-[8px] font-mono text-primary uppercase">Value: 104</span>
</div>
<div class="flex-1 flex items-end px-20 gap-[2px] pb-2 overflow-x-hidden">
<div class="w-1 bg-primary/20 h-1/2"></div>
<div class="w-1 bg-primary/20 h-1/3"></div>
<div class="w-1 bg-primary h-[80%]"></div>
<div class="w-1 bg-primary/40 h-1/2"></div>
<div class="w-1 bg-primary h-[60%]"></div>
<div class="w-1 bg-primary/20 h-1/4"></div>
<div class="w-1 bg-primary/20 h-1/3"></div>
<div class="w-1 bg-primary/20 h-1/2"></div>
<div class="w-1 bg-primary h-[90%]"></div>
<div class="w-1 bg-primary h-[40%]"></div>
<div class="w-1 bg-primary/20 h-1/2"></div>
<div class="w-1 bg-primary/20 h-1/3"></div>
<div class="w-1 bg-primary h-[75%]"></div>
<div class="w-1 bg-primary h-[55%]"></div>
<div class="w-1 bg-primary/20 h-1/2"></div>
<div class="w-1 bg-primary h-[95%]"></div>
<!-- Filler velocity bars -->
<div class="w-1 bg-primary/10 h-1/6"></div><div class="w-1 bg-primary/10 h-1/4"></div><div class="w-1 bg-primary/10 h-1/3"></div><div class="w-1 bg-primary/10 h-1/5"></div>
<div class="w-1 bg-primary/10 h-1/6"></div><div class="w-1 bg-primary/10 h-1/4"></div><div class="w-1 bg-primary/10 h-1/3"></div><div class="w-1 bg-primary/10 h-1/5"></div>
<div class="w-1 bg-primary/10 h-1/6"></div><div class="w-1 bg-primary/10 h-1/4"></div><div class="w-1 bg-primary/10 h-1/3"></div><div class="w-1 bg-primary/10 h-1/5"></div>
<div class="w-1 bg-primary/10 h-1/6"></div><div class="w-1 bg-primary/10 h-1/4"></div><div class="w-1 bg-primary/10 h-1/3"></div><div class="w-1 bg-primary/10 h-1/5"></div>
</div>
</div>
</main>
</div>
<!-- Footer -->
<footer class="bg-[#0e0e0e] text-[#f4ffc6] font-mono text-[9px] uppercase tracking-tighter text-zinc-500 fixed bottom-0 w-full flex justify-between items-center px-4 h-6 border-t border-[#484847]/20 z-50">
<div>Bach Studio Engine v2.4 | CPU: 14% | RAM: 2.4GB</div>
<div class="flex gap-4">
<span class="text-[#f4ffc6]">Buffer: 128</span>
<span class="hover:text-white transition-colors cursor-pointer">44.1kHz</span>
<span class="hover:text-white transition-colors cursor-pointer">24-bit</span>
</div>
</footer>
</body></html>
